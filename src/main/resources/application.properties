spring.application.name=bunnycure
server.port=${PORT:8080}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# Mail - Hostinger
spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
spring.mail.properties.mail.smtp.connectionpool.debug=false
spring.mail.properties.mail.smtp.connectionpool.lifetime=300

bunnycure.mail.from=${MAIL_FROM:contacto@bunnycure.cl}
bunnycure.mail.enabled=${MAIL_ENABLED:true}
bunnycure.whatsapp.number=${WHATSAPP_NUMBER:56927978078}
bunnycure.whatsapp.admin-alert.enabled=${WHATSAPP_ADMIN_ALERT_ENABLED:true}
bunnycure.whatsapp.admin-alert-number=${WHATSAPP_ADMIN_ALERT_NUMBER:56964499995}
bunnycure.whatsapp.admin-alert.outbox.enabled=${WHATSAPP_ADMIN_ALERT_OUTBOX_ENABLED:true}
bunnycure.whatsapp.admin-alert.outbox.batch-size=${WHATSAPP_ADMIN_ALERT_OUTBOX_BATCH_SIZE:20}
bunnycure.whatsapp.admin-alert.outbox.max-attempts=${WHATSAPP_ADMIN_ALERT_OUTBOX_MAX_ATTEMPTS:6}
bunnycure.whatsapp.admin-alert.outbox.retry-base-seconds=${WHATSAPP_ADMIN_ALERT_OUTBOX_RETRY_BASE_SECONDS:30}
bunnycure.whatsapp.admin-alert.outbox.dispatcher-cron=${WHATSAPP_ADMIN_ALERT_OUTBOX_DISPATCHER_CRON:0 */1 * * * *}
bunnycure.whatsapp.admin-alert.outbox.cleanup-enabled=${WHATSAPP_ADMIN_ALERT_OUTBOX_CLEANUP_ENABLED:true}
bunnycure.whatsapp.admin-alert.outbox.retention-days=${WHATSAPP_ADMIN_ALERT_OUTBOX_RETENTION_DAYS:30}
bunnycure.whatsapp.admin-alert.outbox.cleanup-cron=${WHATSAPP_ADMIN_ALERT_OUTBOX_CLEANUP_CRON:0 20 * * * *}

# Async
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Fallback if DB does not have the setting
app.booking.enabled=true

# Reminder scheduler (T2.2) - configurable without code changes
bunnycure.scheduler.timezone=${APP_TIMEZONE:America/Santiago}
bunnycure.reminder.morning.cron=${REMINDER_MORNING_CRON:0 0 8 * * *}
bunnycure.reminder.day-before.cron=${REMINDER_DAY_BEFORE_CRON:0 0 9 * * *}
# Se ejecuta cada 30 minutos para detectar citas agendadas recientemente que necesiten recordatorio
bunnycure.reminder.two-hours.cron=${REMINDER_TWO_HOURS_CRON:0 */30 * * * *}

# Whatsapp notificaciones
whatsapp.api.token=${WHATSAPP_API_TOKEN}
whatsapp.api.phoneId=${WHATSAPP_PHONE_ID}

# Templates configurados
whatsapp.api.citaConfirmadaTemplateName=${WHATSAPP_TEMPLATE_CONFIRMACION:confirmacion_cita}
whatsapp.api.recordatorioCitaTemplateName=${WHATSAPP_TEMPLATE_RECORDATORIO:recordatorio_cita}
whatsapp.api.cancelacionCitaTemplateName=${WHATSAPP_TEMPLATE_CANCELACION:cancelacion_cita}
whatsapp.api.agendaEnRevisionTemplateName=${WHATSAPP_TEMPLATE_AGENDA:agenda_en_revision}
whatsapp.api.solicitudRechazadaTemplateName=${WHATSAPP_TEMPLATE_RECHAZO:solicitud_rechazada}
whatsapp.api.adminBookingAlertTemplateName=${WHATSAPP_TEMPLATE_ADMIN_ALERT:}
whatsapp.api.adminAppointmentAlertTemplateName=${WHATSAPP_TEMPLATE_ADMIN_APPOINTMENT_ALERT:confirmacion_hora}

# Idioma de templates
whatsapp.api.citaConfirmadaLanguageCode=${WHATSAPP_TEMPLATE_LANG:es_CL}
whatsapp.api.adminBookingAlertLanguageCode=${WHATSAPP_TEMPLATE_ADMIN_ALERT_LANG:es_CL}

# Habilitar/deshabilitar templates por paso
whatsapp.api.useTemplateForConfirmation=${WHATSAPP_USE_TEMPLATE_CONFIRMATION:true}
whatsapp.api.useTemplateForReminder=${WHATSAPP_USE_TEMPLATE_REMINDER:true}
whatsapp.api.useTemplateForCancellation=${WHATSAPP_USE_TEMPLATE_CANCELLATION:true}
whatsapp.api.useTemplateForBookingRequest=${WHATSAPP_USE_TEMPLATE_BOOKING_REQUEST:true}
whatsapp.api.useTemplateForBookingRejection=${WHATSAPP_USE_TEMPLATE_BOOKING_REJECTION:true}
whatsapp.api.useTemplateForAdminAlert=${WHATSAPP_USE_TEMPLATE_ADMIN_ALERT:false}
whatsapp.api.useTemplateForAdminAppointmentAlert=${WHATSAPP_USE_TEMPLATE_ADMIN_APPOINTMENT_ALERT:true}
whatsapp.api.adminBookingRequestsUrl=${WHATSAPP_ADMIN_BOOKING_REQUESTS_URL:}

# Nombre del negocio
whatsapp.api.businessName=${WHATSAPP_BUSINESS_NAME:BunnyCure}

# Whatsapp Webhook
whatsapp.webhook.verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:bunnycure_webhook_token_2024}
whatsapp.webhook.app-secret=${WHATSAPP_WEBHOOK_APP_SECRET:}
whatsapp.webhook.alert-admin=${WHATSAPP_WEBHOOK_ALERT_ADMIN:false}
whatsapp.webhook.customer-record.authorized-numbers=${WHATSAPP_CUSTOMER_RECORD_AUTHORIZED:56964499995,56983692046}
whatsapp.webhook.operational-events.cleanup-enabled=${WHATSAPP_WEBHOOK_OP_EVENTS_CLEANUP_ENABLED:true}
whatsapp.webhook.operational-events.retention-days=${WHATSAPP_WEBHOOK_OP_EVENTS_RETENTION_DAYS:30}
whatsapp.webhook.operational-events.cleanup-cron=${WHATSAPP_WEBHOOK_OP_EVENTS_CLEANUP_CRON:0 15 * * * *}
