# PostgreSQL - Configured programmatically via HerokuDataSourceConfig
# DATABASE_URL is provided by Heroku and parsed in HerokuDataSourceConfig.java

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# Email - SMTP from env vars
spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# Sender config
bunnycure.mail.from=${MAIL_FROM:contacto@bunnycure.cl}
bunnycure.mail.enabled=${MAIL_ENABLED:true}

# WhatsApp
bunnycure.whatsapp.number=${WHATSAPP_NUMBER:56964499995}

# Logging
logging.level.root=INFO
logging.level.cl.bunnycure=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO
