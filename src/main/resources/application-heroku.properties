# PostgreSQL - Configured programmatically via HerokuDataSourceConfig
# DATABASE_URL is provided by Heroku and parsed in HerokuDataSourceConfig.java

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.id.sequence.increment_size_mismatch_strategy=log

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# Email - SMTP from env vars
spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# Sender config
bunnycure.mail.from=${MAIL_FROM:contacto@bunnycure.cl}
bunnycure.mail.enabled=${MAIL_ENABLED:true}

# Admin bootstrap credentials (required in heroku profile)
bunnycure.admin.username=${BUNNYCURE_ADMIN_USERNAME:}
bunnycure.admin.password=${BUNNYCURE_ADMIN_PASSWORD:}

# WhatsApp
bunnycure.whatsapp.number=${WHATSAPP_NUMBER:56964499995}
bunnycure.whatsapp.admin-alert.enabled=${WHATSAPP_ADMIN_ALERT_ENABLED:true}
bunnycure.whatsapp.admin-alert-number=${WHATSAPP_ADMIN_ALERT_NUMBER:56964499995}
bunnycure.whatsapp.admin-alert.outbox.enabled=${WHATSAPP_ADMIN_ALERT_OUTBOX_ENABLED:true}
bunnycure.whatsapp.admin-alert.outbox.batch-size=${WHATSAPP_ADMIN_ALERT_OUTBOX_BATCH_SIZE:20}
bunnycure.whatsapp.admin-alert.outbox.max-attempts=${WHATSAPP_ADMIN_ALERT_OUTBOX_MAX_ATTEMPTS:6}
bunnycure.whatsapp.admin-alert.outbox.retry-base-seconds=${WHATSAPP_ADMIN_ALERT_OUTBOX_RETRY_BASE_SECONDS:30}
bunnycure.whatsapp.admin-alert.outbox.dispatcher-cron=${WHATSAPP_ADMIN_ALERT_OUTBOX_DISPATCHER_CRON:0 */1 * * * *}
bunnycure.whatsapp.admin-alert.outbox.cleanup-enabled=${WHATSAPP_ADMIN_ALERT_OUTBOX_CLEANUP_ENABLED:true}
bunnycure.whatsapp.admin-alert.outbox.retention-days=${WHATSAPP_ADMIN_ALERT_OUTBOX_RETENTION_DAYS:30}
bunnycure.whatsapp.admin-alert.outbox.cleanup-cron=${WHATSAPP_ADMIN_ALERT_OUTBOX_CLEANUP_CRON:0 20 * * * *}

# WhatsApp Cloud API - Configurar en Heroku:
# heroku config:set WHATSAPP_API_TOKEN=tu_token
# heroku config:set WHATSAPP_PHONE_ID=tu_phone_id
# heroku config:set WHATSAPP_WEBHOOK_APP_SECRET=tu_app_secret
# Ya estan mapeadas en application.properties

# Logging
logging.level.root=INFO
logging.level.cl.bunnycure=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO

# Reverse proxy / custom domain support
server.forward-headers-strategy=framework