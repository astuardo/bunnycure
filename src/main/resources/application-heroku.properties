# PostgreSQL - Heroku injects PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automatically
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Email - Hostinger SMTP
spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# Email sender configuration
bunnycure.mail.from=${MAIL_FROM:contacto@bunnycure.cl}
bunnycure.mail.enabled=${MAIL_ENABLED:true}

# WhatsApp
bunnycure.whatsapp.number=${WHATSAPP_NUMBER:56964499995}

# Logging (reducir verbosidad en producci¾n)
logging.level.root=INFO
logging.level.cl.bunnycure=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO