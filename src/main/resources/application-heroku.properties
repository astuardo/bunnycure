# Heroku inyecta JDBC_DATABASE_URL automįticamente via el Add-on de Postgres
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones (Heroku Free tier: mįx 20 conexiones)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# SSL requerido por Heroku Postgres
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

spring.jpa.hibernate.ddl-auto=update
spring.thymeleaf.cache=true

# Heroku: setear con heroku config:set
bunnycure.admin.username=${ADMIN_USERNAME:admin}
bunnycure.admin.password=${ADMIN_PASSWORD}