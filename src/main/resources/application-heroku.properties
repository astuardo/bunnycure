# PostgreSQL - Configured programmatically via HerokuDataSourceConfig
# DATABASE_URL is provided by Heroku and parsed in HerokuDataSourceConfig.java

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.id.sequence.increment_size_mismatch_strategy=log

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# Email - SMTP from env vars
spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# Sender config
bunnycure.mail.from=${MAIL_FROM:contacto@bunnycure.cl}
bunnycure.mail.enabled=${MAIL_ENABLED:true}

# Admin bootstrap credentials (required in heroku profile)
bunnycure.admin.username=${BUNNYCURE_ADMIN_USERNAME:}
bunnycure.admin.password=${BUNNYCURE_ADMIN_PASSWORD:}

# WhatsApp
bunnycure.whatsapp.number=${WHATSAPP_NUMBER:56964499995}
bunnycure.whatsapp.admin-alert.enabled=${WHATSAPP_ADMIN_ALERT_ENABLED:true}
bunnycure.whatsapp.admin-alert-number=${WHATSAPP_ADMIN_ALERT_NUMBER:56964499995}
bunnycure.whatsapp.admin-alert.outbox.enabled=${WHATSAPP_ADMIN_ALERT_OUTBOX_ENABLED:true}
bunnycure.whatsapp.admin-alert.outbox.batch-size=${WHATSAPP_ADMIN_ALERT_OUTBOX_BATCH_SIZE:20}
bunnycure.whatsapp.admin-alert.outbox.max-attempts=${WHATSAPP_ADMIN_ALERT_OUTBOX_MAX_ATTEMPTS:6}
bunnycure.whatsapp.admin-alert.outbox.retry-base-seconds=${WHATSAPP_ADMIN_ALERT_OUTBOX_RETRY_BASE_SECONDS:30}
bunnycure.whatsapp.admin-alert.outbox.dispatcher-cron=${WHATSAPP_ADMIN_ALERT_OUTBOX_DISPATCHER_CRON:0 */1 * * * *}
bunnycure.whatsapp.admin-alert.outbox.cleanup-enabled=${WHATSAPP_ADMIN_ALERT_OUTBOX_CLEANUP_ENABLED:true}
bunnycure.whatsapp.admin-alert.outbox.retention-days=${WHATSAPP_ADMIN_ALERT_OUTBOX_RETENTION_DAYS:30}
bunnycure.whatsapp.admin-alert.outbox.cleanup-cron=${WHATSAPP_ADMIN_ALERT_OUTBOX_CLEANUP_CRON:0 20 * * * *}

# WhatsApp admin alert personalization
whatsapp.api.adminBookingAlertTemplateName=${WHATSAPP_TEMPLATE_ADMIN_ALERT:}
whatsapp.api.adminBookingAlertLanguageCode=${WHATSAPP_TEMPLATE_ADMIN_ALERT_LANG:es_CL}
whatsapp.api.useTemplateForAdminAlert=${WHATSAPP_USE_TEMPLATE_ADMIN_ALERT:false}
whatsapp.api.adminBookingRequestsUrl=${WHATSAPP_ADMIN_BOOKING_REQUESTS_URL:}

# Reminder scheduler (T2.2)
bunnycure.scheduler.timezone=${APP_TIMEZONE:America/Santiago}
bunnycure.reminder.morning.cron=${REMINDER_MORNING_CRON:0 0 8 * * *}
bunnycure.reminder.day-before.cron=${REMINDER_DAY_BEFORE_CRON:0 0 9 * * *}
bunnycure.reminder.two-hours.cron=${REMINDER_TWO_HOURS_CRON:0 0 */2 * * *}

# WhatsApp Cloud API - Configurar en Heroku:
# heroku config:set WHATSAPP_API_TOKEN=tu_token
# heroku config:set WHATSAPP_PHONE_ID=tu_phone_id
# heroku config:set WHATSAPP_WEBHOOK_APP_SECRET=tu_app_secret
# Ya estan mapeadas en application.properties

# Logging
logging.level.root=INFO
logging.level.cl.bunnycure=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO

# CORS Configuration for React PWA frontend in production
# Add your frontend domain here when deployed (e.g., Vercel, Netlify)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,https://bunnycure-frontend.vercel.app}
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# Session Cookie Configuration for Cross-Origin (Heroku to Vercel)
# CRITICAL for cookies to work between different domains
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# Reverse proxy / custom domain support
server.forward-headers-strategy=framework

# Disable schedulers in production (during PWA migration)
# Schedulers use Thymeleaf templates that won't work in API-only mode
# Re-enable after migrating reminder logic to REST API
spring.task.scheduling.enabled=false