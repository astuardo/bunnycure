# Configuracion de Spring Boot DevTools
# IMPORTANTE: Los valores deben ser expresiones regulares de Java, NO patrones glob

# ===================================================================
# EXCLUSIONES - Archivos que NO deben provocar reinicio (REGEX)
# ===================================================================
# Recursos estaticos (CSS, JS, imagenes) no requieren reinicio
restart.exclude.static=/static/.*
restart.exclude.public=/public/.*
restart.exclude.webjars=/webjars/.*

# Templates de Thymeleaf - LiveReload los recarga sin reiniciar
restart.exclude.templates=/templates/.*

# ===================================================================
# NOTAS
# ===================================================================
# - Usar expresiones regulares de Java validas
# - Para coincidir con cualquier cosa: .*
# - Para coincidir con cualquier caracter excepto /: [^/]+
# - Los archivos .class compilados siempre provocan reinicio
# - Los archivos en target/ son ignorados automaticamente
# - La configuracion de polling esta en application-local.properties
