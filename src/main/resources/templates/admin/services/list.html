<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Servicios – Bunny Cure</title></head>
<body>
<section th:fragment="content">

  <!-- Encabezado -->
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
      <h4 class="fw-bold mb-0">Catálogo de Servicios</h4>
      <p class="text-muted small mb-0">Precios y duraciones editables</p>
    </div>
    <a th:href="@{/admin/services/new}" class="btn btn-bc">
      <i class="bi bi-plus-lg me-1"></i> Nuevo Servicio
    </a>
  </div>

  <!-- Alerta éxito -->
  <div th:if="${successMsg}"
       class="alert alert-success alert-dismissible fade show">
    <i class="bi bi-check-circle me-2"></i>
    <span th:text="${successMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- ── TABLA (solo desktop ≥ md) ─────────────────────────────────── -->
  <div class="card table-card d-none d-md-block">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead>
        <tr>
          <th>#</th>
          <th>Servicio</th>
          <th>Duración</th>
          <th>Precio</th>
          <th>Estado</th>
          <th class="text-end">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${services}"
            th:classappend="${!s.active} ? 'opacity-50'">
          <td class="text-muted small" th:text="${s.displayOrder}"></td>
          <td>
            <div class="fw-semibold" th:text="${s.name}"></div>
            <small class="text-muted"
                   th:if="${s.description}"
                   th:text="${s.description}">
            </small>
          </td>
          <td>
              <span class="badge rounded-pill"
                    style="background:#EDE9FE;color:#8B5CF6;"
                    th:text="${s.durationFormatted}">
              </span>
          </td>
          <td class="fw-semibold">
            $<span th:text="${#numbers.formatInteger(s.price, 0, 'POINT')}"></span>
          </td>
          <td>
            <form th:action="@{/admin/services/{id}/toggle(id=${s.id})}"
                  method="post" class="d-inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit"
                      class="badge border-0 rounded-pill px-3 py-1"
                      th:classappend="${s.active} ? 'badge-completed' : 'badge-cancelled'"
                      th:text="${s.active} ? 'Activo' : 'Oculto'">
              </button>
            </form>
          </td>
          <td class="text-end">
            <a th:href="@{/admin/services/{id}/edit(id=${s.id})}"
               class="btn btn-sm btn-outline-secondary me-1">
              <i class="bi bi-pencil"></i>
            </a>
            <form th:action="@{/admin/services/{id}/delete(id=${s.id})}"
                  method="post" class="d-inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit"
                      class="btn btn-sm btn-outline-danger"
                      onclick="return confirm('¿Eliminar este servicio?')">
                <i class="bi bi-trash"></i>
              </button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── CARDS (solo móvil < md) ───────────────────────────────────── -->
  <div class="d-md-none d-flex flex-column gap-3">
    <div th:each="s : ${services}"
         class="card table-card p-3"
         th:classappend="${!s.active} ? 'opacity-60'">

      <!-- Fila superior: nombre + badges -->
      <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
        <div class="fw-semibold" style="font-size:1rem;" th:text="${s.name}"></div>
        <div class="d-flex gap-1 flex-shrink-0">
          <!-- Badge duración -->
          <span class="badge rounded-pill"
                style="background:#EDE9FE;color:#8B5CF6;"
                th:text="${s.durationFormatted}">
          </span>
          <!-- Toggle estado -->
          <form th:action="@{/admin/services/{id}/toggle(id=${s.id})}"
                method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"
                    class="badge border-0 rounded-pill px-2 py-1"
                    th:classappend="${s.active} ? 'badge-completed' : 'badge-cancelled'"
                    th:text="${s.active} ? 'Activo' : 'Oculto'">
            </button>
          </form>
        </div>
      </div>

      <!-- Descripción -->
      <small class="text-muted d-block mb-2"
             th:if="${s.description}"
             th:text="${s.description}">
      </small>

      <!-- Fila inferior: precio + acciones -->
      <div class="d-flex justify-content-between align-items-center mt-1">
        <span class="fw-bold" style="font-size:1.1rem;color:#111;">
          $<span th:text="${#numbers.formatInteger(s.price, 0, 'POINT')}"></span>
        </span>
        <div class="d-flex gap-2">
          <a th:href="@{/admin/services/{id}/edit(id=${s.id})}"
             class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-pencil me-1"></i>Editar
          </a>
          <form th:action="@{/admin/services/{id}/delete(id=${s.id})}"
                method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"
                    class="btn btn-sm btn-outline-danger"
                    onclick="return confirm('¿Eliminar este servicio?')">
              <i class="bi bi-trash"></i>
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>

</section>
</body>
</html>
