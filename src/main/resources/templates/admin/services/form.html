<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Servicio – Bunny Cure</title></head>
<body>
<section th:fragment="content">

  <div class="d-flex align-items-center gap-2 mb-4">
    <a th:href="@{/admin/services}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <div>
      <h4 class="fw-bold mb-0"
          th:text="${isNew} ? 'Nuevo Servicio' : 'Editar Servicio'"></h4>
      <p class="text-muted small mb-0">Catálogo de servicios</p>
    </div>
  </div>

  <div class="card table-card">
    <div class="card-body p-4">
      <form th:action="${isNew} ? @{/admin/services} :
                              @{/admin/services/{id}/edit(id=${service.id})}"
            th:object="${service}"
            method="post" novalidate>

        <div class="row g-3">

          <div class="col-md-8">
            <label class="form-label fw-semibold">
              Nombre del servicio <span class="text-danger">*</span>
            </label>
            <input type="text"
                   th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   class="form-control"
                   placeholder="Ej: Manicure + Brillo"/>
            <div class="invalid-feedback" th:errors="*{name}"></div>
          </div>

          <div class="col-md-4">
            <label class="form-label fw-semibold">Orden de aparición</label>
            <input type="number"
                   th:field="*{displayOrder}"
                   class="form-control"
                   min="0" placeholder="0"/>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">
              Duración (minutos) <span class="text-danger">*</span>
            </label>
            <div class="input-group">
              <input type="number"
                     th:field="*{durationMinutes}"
                     th:classappend="${#fields.hasErrors('durationMinutes')} ? 'is-invalid'"
                     class="form-control"
                     min="15" max="480" step="15"
                     placeholder="60"/>
              <span class="input-group-text text-muted">min</span>
            </div>
            <div class="form-text text-muted">
              60 = 1 hr · 90 = 1:30 hrs · 120 = 2 hrs
            </div>
            <div class="invalid-feedback" th:errors="*{durationMinutes}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">
              Precio <span class="text-danger">*</span>
            </label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number"
                     th:field="*{price}"
                     th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                     class="form-control"
                     min="0" step="1000"
                     placeholder="10000"/>
            </div>
            <div class="invalid-feedback" th:errors="*{price}"></div>
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">
              Descripción <span class="text-muted fw-normal">(opcional)</span>
            </label>
            <input type="text"
                   th:field="*{description}"
                   class="form-control"
                   placeholder="Breve descripción que verán las clientas"/>
          </div>

          <div th:unless="${isNew}" class="col-12">
            <div class="form-check form-switch">
              <input type="checkbox"
                     th:field="*{active}"
                     class="form-check-input"
                     role="switch"/>
              <label class="form-check-label fw-semibold">
                Servicio activo (visible para clientas)
              </label>
            </div>
          </div>

        </div>

        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-bc px-4">
            <i class="bi bi-check-lg me-1"></i>
            <span th:text="${isNew} ? 'Crear Servicio' : 'Guardar Cambios'"></span>
          </button>
          <a th:href="@{/admin/services}"
             class="btn btn-outline-secondary px-4">Cancelar</a>
        </div>

      </form>
    </div>
  </div>

</section>
</body>
</html>
