<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section}, _)}">
<head>
    <title>Mi Perfil – Bunny Cure</title>
</head>
<body>
<section th:fragment="content">

  <div class="mb-4">
    <h4 class="fw-bold mb-0">
      <i class="bi bi-person-circle"></i> Mi Perfil
    </h4>
    <p class="text-muted small mb-0">Gestiona tu información y contraseña</p>
  </div>

  <!-- Mensajes -->
  <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
    <i class="bi bi-check-circle me-2"></i>
    <span th:text="${successMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
    <i class="bi bi-exclamation-triangle me-2"></i>
    <span th:text="${errorMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="row">
    <!-- Información -->
    <div class="col-md-6">
      <div class="card table-card mb-3">
        <div class="card-header">
          <h6 class="mb-0 fw-semibold">Información</h6>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Usuario</label>
            <div class="fw-bold" th:text="${user.username}">admin</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Nombre Completo</label>
            <div th:text="${user.fullName}">Administrador</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Email</label>
            <div th:text="${user.email ?: 'No configurado'}">email@example.com</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Miembro desde</label>
            <div th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</div>
          </div>
          <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-outline-primary btn-sm">
            <i class="bi bi-pencil"></i> Editar Información
          </a>
        </div>
      </div>
    </div>

    <!-- Cambiar mi contraseña -->
    <div class="col-md-6">
      <div class="card table-card mb-3">
        <div class="card-header">
          <h6 class="mb-0 fw-semibold">Cambiar Mi Contraseña</h6>
        </div>
        <div class="card-body">
          <form th:action="@{/admin/users/profile/change-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
              <label class="form-label fw-semibold">Contraseña Actual</label>
              <input type="password" name="currentPassword" class="form-control" 
                     required placeholder="Tu contraseña actual">
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Nueva Contraseña</label>
              <input type="password" name="newPassword" class="form-control" 
                     minlength="4" required placeholder="Mínimo 4 caracteres">
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Confirmar Nueva Contraseña</label>
              <input type="password" name="confirmPassword" class="form-control" 
                     minlength="4" required placeholder="Repite la contraseña">
            </div>

            <button type="submit" class="btn btn-warning">
              <i class="bi bi-key"></i> Cambiar Contraseña
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

</section>
</body>
</html>
