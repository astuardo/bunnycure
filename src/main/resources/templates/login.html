<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BunnyCure – Login</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <style>
        body { background: linear-gradient(135deg, #8B5CF6, #EC4899); min-height: 100vh; }
        .card { border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="card p-4" style="width: 380px;">

    <div class="text-center mb-4">
        <h2 class="fw-bold">🐇 BunnyCure</h2>
        <p class="text-muted small">Panel Administrativo</p>
    </div>

    <!-- Alerta error -->
    <div th:if="${param.error}"
         class="alert alert-danger alert-sm py-2 small" role="alert">
        Usuario o contraseña incorrectos.
    </div>

    <!-- Alerta logout -->
    <div th:if="${param.logout}"
         class="alert alert-success alert-sm py-2 small" role="alert">
        Sesión cerrada correctamente.
    </div>

    <div th:if="${successMsg}"
         class="alert alert-success alert-sm py-2 small" role="alert"
         th:text="${successMsg}"></div>

    <div th:if="${errorMsg}"
         class="alert alert-danger alert-sm py-2 small" role="alert"
         th:text="${errorMsg}"></div>

    <!-- ✅ th:action inyecta CSRF automáticamente con Thymeleaf Security -->
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Usuario</label>
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="admin"
                   autofocus
                   required/>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="••••••••"
                   required/>
        </div>
        <button type="submit" class="btn w-100 text-white fw-bold"
                style="background: linear-gradient(135deg, #8B5CF6, #EC4899);">
            Ingresar
        </button>

        <div class="text-center mt-3">
            <a th:href="@{/forgot-password}" class="small text-decoration-none">
                ¿Olvidaste tu contraseña?
            </a>
        </div>
    </form>

</div>
</body>
</html>
