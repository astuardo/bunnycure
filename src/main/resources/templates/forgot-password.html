<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BunnyCure - Recuperar contraseña</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
<div class="container" style="max-width: 460px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-2">Recuperar contraseña</h4>
            <p class="text-muted small mb-3">Ingresa tu correo registrado para enviarte un enlace seguro.</p>

            <div th:if="${successMsg}" class="alert alert-success py-2 small" th:text="${successMsg}"></div>
            <div th:if="${errorMsg}" class="alert alert-danger py-2 small" th:text="${errorMsg}"></div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input type="email" name="email" class="form-control" required/>
                </div>
                <button class="btn btn-primary w-100" type="submit">Enviar enlace</button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/login}" class="small text-decoration-none">Volver al login</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
