<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content, script)"
      lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">BunnyCure</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo.png}" href="/images/logo.png"/>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        :root {
            --bc-purple: #8B5CF6;
            --bc-pink:   #EC4899;
            --bc-grad:   linear-gradient(135deg, #8B5CF6, #EC4899);
            --app-primary: [[${appPrimaryColor ?: '#F472B6'}]];
            --app-secondary: [[${appSecondaryColor ?: '#8B5CF6'}]];
            --app-grad: linear-gradient(135deg, var(--app-secondary), var(--app-primary));
        }

        body { background-color: #F9FAFB; font-family: 'Segoe UI', sans-serif; }

        /* ── Sidebar desktop ── */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: var(--app-grad);
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }
        .sidebar-brand {
            padding: 24px 20px 16px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .sidebar-brand span { font-size: .8rem; font-weight: 400; opacity: .8; display: block; }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 8px;
            margin: 2px 10px;
            font-size: .92rem;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .sidebar .nav-link i { width: 20px; margin-right: 8px; }
        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        /* ── Main content desktop ── */
        .main-content {
            margin-left: 240px;
            padding: 28px;
            min-height: 100vh;
        }

        /* ── Sidebar móvil: se convierte en topbar colapsable ── */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                min-height: auto;
                position: relative;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                padding: 8px 12px;
            }
            .sidebar-toggle-area {
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
            }
            .sidebar ul.nav {
                flex-direction: row !important;
                flex-wrap: wrap;
                width: 100%;
                margin-top: 8px !important;
            }
            .sidebar .nav-link {
                padding: 8px 12px;
                margin: 2px 4px;
                font-size: .82rem;
            }
            .sidebar-footer {
                width: 100%;
                padding: 8px 10px;
                border-top: 1px solid rgba(255,255,255,0.2);
            }
            .main-content {
                margin-left: 0;
                padding: 16px;
            }
            /* Ocultar nav en móvil por defecto, mostrar con JS */
            .sidebar-nav-collapse {
                display: none;
                width: 100%;
            }
            .sidebar-nav-collapse.open {
                display: block;
            }
        }

        /* ── Cards ── */
        .stat-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        .stat-card .icon-box {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }

        /* ── Tabla ── */
        .table-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .table thead th {
            background: #F3F4F6;
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #6B7280;
            border: none;
        }

        /* ── Badge status ── */
        .badge-pending   { background:#FEF3C7; color:#92400E; }
        .badge-confirmed { background:#DBEAFE; color:#1E40AF; }
        .badge-completed { background:#D1FAE5; color:#065F46; }
        .badge-cancelled { background:#FEE2E2; color:#991B1B; }

        /* ── Botón primario ── */
        .btn-bc {
            background: var(--bc-grad);
            color: #fff;
            border: none;
            border-radius: 8px;
        }
        .btn-bc:hover { opacity: .9; color: #fff; }
    </style>
</head>
<body>

<!-- ── Sidebar ───────────────────────────────────────────────── -->
<nav class="sidebar">

    <!-- Brand + toggle móvil -->
    <div class="sidebar-toggle-area">
        <div class="d-flex align-items-center gap-2 py-1">
            <div style="font-size:1.6rem; line-height:1;">🐰</div>
            <div>
                <div class="fw-bold text-white" style="font-size:1rem; letter-spacing:-.2px;">
                    <span th:text="${appName ?: 'BunnyCure'}">BunnyCure</span>
                </div>
                <div class="text-white" style="font-size:.68rem; opacity:.75; line-height:1.2;">
                    <span th:text="${appSlogan ?: 'Arte en tus manos ✨'}">Arte en tus manos ✨</span>
                </div>
            </div>
        </div>
        <!-- Botón hamburguesa solo en móvil -->
        <button class="btn d-md-none text-white p-1"
                onclick="toggleSidebarNav()"
                style="background:rgba(255,255,255,.15);border-radius:8px;">
            <i class="bi bi-list fs-5"></i>
        </button>
    </div>

    <!-- Nav links (colapsable en móvil) -->
    <div class="sidebar-nav-collapse" id="sidebarNav">
        <ul class="nav flex-column mt-3">
            <li class="nav-item">
                <a th:href="@{/dashboard}"
                   th:classappend="${activeMenu == 'dashboard'} ? 'active'"
                   class="nav-link">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/customers}"
                   th:classappend="${activeMenu == 'customers'} ? 'active'"
                   class="nav-link">
                    <i class="bi bi-people"></i> Clientes
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/appointments}"
                   th:classappend="${activeMenu == 'appointments'} ? 'active'"
                   class="nav-link">
                    <i class="bi bi-calendar3"></i> Citas
                </a>
            </li>
            <!-- Recordatorios de citas -->
            <li class="nav-item">
                <a th:href="@{/admin/reminders}"
                   th:classappend="${activeMenu == 'reminders'} ? 'active'"
                   class="nav-link">
                    <i class="bi bi-bell"></i> Recordatorios
                </a>
            </li>
            <!-- Solicitudes de reserva con badge de pendientes -->
            <li class="nav-item">
                <a th:href="@{/admin/booking-requests}"
                   th:classappend="${activeMenu == 'booking-requests'} ? 'active'"
                   class="nav-link">
                    <i class="bi bi-inbox"></i> Solicitudes
                    <span th:if="${pendingBookingCount > 0}"
                          class="badge rounded-pill ms-auto"
                          style="background:rgba(255,255,255,0.9);color:#92400E;font-size:.65rem;"
                          th:text="${pendingBookingCount}">
                    </span>
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/services}"
                   th:classappend="${activeMenu == 'services'} ? 'active'"
                   class="nav-link">
                    <i class="bi bi-scissors"></i> Servicios
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/users}"
                   th:classappend="${activeMenu == 'users'} ? 'active'"
                   class="nav-link">
                    <i class="bi bi-people"></i> Usuarios
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/settings}"
                   th:classappend="${activeMenu == 'settings'} ? 'active'"
                   class="nav-link">
                    <i class="bi bi-gear"></i> Configuración
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <div class="d-flex align-items-center gap-2 mb-2">
                <div style="width:32px;height:32px;border-radius:50%;
                            background:rgba(255,255,255,0.3);
                            display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-person text-white"></i>
                </div>
                <div class="flex-grow-1">
                    <div class="text-white fw-semibold small"
                         sec:authentication="name">Admin</div>
                    <div class="text-white opacity-75" style="font-size:.7rem;">Administrador</div>
                </div>
            </div>
            <div class="d-flex gap-1 mb-2">
                <a th:href="@{/admin/users/profile}"
                   class="btn btn-sm flex-grow-1 text-white"
                   style="background:rgba(255,255,255,0.15);border-radius:8px;">
                    <i class="bi bi-person-circle"></i> Perfil
                </a>
                <form th:action="@{/logout}" method="post" class="flex-grow-1">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            class="btn btn-sm w-100 text-white"
                            style="background:rgba(255,255,255,0.15);border-radius:8px;">
                        <i class="bi bi-box-arrow-right"></i> Salir
                    </button>
                </form>
            </div>
        </div>
    </div>

</nav>

<!-- ── Contenido principal ───────────────────────────────────── -->
<main class="main-content">
    <div th:replace="${content}">
        <!-- El contenido de cada página va aquí -->
    </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // En desktop el nav siempre visible; en móvil toggle
    function toggleSidebarNav() {
        const nav = document.getElementById('sidebarNav');
        const isOpen = nav.classList.toggle('open');
        if (window.innerWidth < 768) {
            nav.style.display = isOpen ? 'block' : 'none';
        }
    }

    // En desktop siempre mostrar el nav
    function checkDesktop() {
        const nav = document.getElementById('sidebarNav');
        if (window.innerWidth >= 768) {
            nav.style.display = '';
            nav.classList.remove('open');
        } else {
            nav.style.display = nav.classList.contains('open') ? 'block' : 'none';
        }
    }

    // Inicializar y escuchar resize
    checkDesktop();
    window.addEventListener('resize', checkDesktop);
</script>

<!-- Custom scripts placeholder -->
<th:block th:replace="${script} ?: ~{}"></th:block>

</body>
</html>
