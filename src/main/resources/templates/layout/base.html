<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)"
      lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">BunnyCure</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        :root {
            --bc-purple: #8B5CF6;
            --bc-pink:   #EC4899;
            --bc-grad:   linear-gradient(135deg, #8B5CF6, #EC4899);
        }

        body { background-color: #F9FAFB; font-family: 'Segoe UI', sans-serif; }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: var(--bc-grad);
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }
        .sidebar-brand {
            padding: 24px 20px 16px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .sidebar-brand span { font-size: .8rem; font-weight: 400; opacity: .8; display: block; }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 8px;
            margin: 2px 10px;
            font-size: .92rem;
            transition: all .2s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .sidebar .nav-link i { width: 20px; margin-right: 8px; }
        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        /* ── Main content ── */
        .main-content {
            margin-left: 240px;
            padding: 28px;
            min-height: 100vh;
        }

        /* ── Cards ── */
        .stat-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        .stat-card .icon-box {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }

        /* ── Tabla ── */
        .table-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .table thead th {
            background: #F3F4F6;
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #6B7280;
            border: none;
        }

        /* ── Badge status ── */
        .badge-pending   { background:#FEF3C7; color:#92400E; }
        .badge-completed { background:#D1FAE5; color:#065F46; }
        .badge-cancelled { background:#FEE2E2; color:#991B1B; }

        /* ── Botón primario ── */
        .btn-bc {
            background: var(--bc-grad);
            color: #fff;
            border: none;
            border-radius: 8px;
        }
        .btn-bc:hover { opacity: .9; color: #fff; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { width: 100%; min-height: auto; position: relative; }
            .main-content { margin-left: 0; padding: 16px; }
        }
    </style>
</head>
<body>

<!-- ── Sidebar ───────────────────────────────────────────────── -->
<nav class="sidebar">
    <!-- Sidebar brand -->
    <div class="p-3 d-flex align-items-center gap-2"
         style="border-bottom:1px solid rgba(255,255,255,.15);">
        <div style="font-size:1.6rem; line-height:1;">🐰</div>
        <div>
            <div class="fw-bold" style="font-size:1rem; letter-spacing:-.2px;">
                Bunny Cure
            </div>
            <div style="font-size:.68rem; opacity:.75; line-height:1.2;">
                Arte en tus manos ✨
            </div>
        </div>
    </div>

    <ul class="nav flex-column mt-3">
        <li class="nav-item">
            <a th:href="@{/dashboard}"
               th:classappend="${activeMenu == 'dashboard'} ? 'active'"
               class="nav-link">
                <i class="bi bi-grid-1x2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/customers}"
               th:classappend="${activeMenu == 'customers'} ? 'active'"
               class="nav-link">
                <i class="bi bi-people"></i> Clientes
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/appointments}"
               th:classappend="${activeMenu == 'appointments'} ? 'active'"
               class="nav-link">
                <i class="bi bi-calendar3"></i> Citas
            </a>
        </li>
        <!-- Dentro del menú de navegación -->
        <li>
            <a th:href="@{/admin/services}"
               class="nav-link"
               th:classappend="${activeMenu == 'services'} ? 'active'">
                <i class="bi bi-scissors me-2"></i> Servicios
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/settings}"
               class="nav-link"
               th:classappend="${activeMenu == 'settings'} ? 'active'">
                <i class="bi bi-gear me-2"></i>Configuración
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <div class="d-flex align-items-center gap-2 mb-2">
            <div style="width:32px;height:32px;border-radius:50%;
                        background:rgba(255,255,255,0.3);
                        display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-person text-white"></i>
            </div>
            <div>
                <div class="text-white fw-semibold small"
                     sec:authentication="name">Admin</div>
                <div class="text-white opacity-75" style="font-size:.7rem;">Administrador</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit"
                    class="btn btn-sm w-100 text-white"
                    style="background:rgba(255,255,255,0.15);border-radius:8px;">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
            </button>
        </form>
    </div>
</nav>

<!-- ── Contenido principal ───────────────────────────────────── -->
<main class="main-content">
    <div th:replace="${content}">
        <!-- El contenido de cada página va aquí -->
    </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
