<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BunnyCure - Restablecer contraseña</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
<div class="container" style="max-width: 460px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-2">Nueva contraseña</h4>
            <p class="text-muted small mb-3">Elige una contraseña segura (mínimo 8 caracteres).</p>

            <div th:if="${successMsg}" class="alert alert-success py-2 small" th:text="${successMsg}"></div>
            <div th:if="${errorMsg}" class="alert alert-danger py-2 small" th:text="${errorMsg}"></div>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}"/>

                <div class="mb-3">
                    <label class="form-label">Nueva contraseña</label>
                    <input type="password" name="newPassword" class="form-control" required minlength="8"/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirmar contraseña</label>
                    <input type="password" name="confirmPassword" class="form-control" required minlength="8"/>
                </div>

                <button class="btn btn-primary w-100" type="submit">Guardar contraseña</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
