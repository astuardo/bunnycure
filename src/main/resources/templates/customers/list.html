<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Clientes – BunnyCure</title></head>
<body>
<section th:fragment="content">

    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">Clientes</h4>
            <p class="text-muted small mb-0">Gestión de clientes registrados</p>
        </div>
        <a th:href="@{/customers/new}" class="btn btn-bc">
            <i class="bi bi-person-plus me-1"></i> Nuevo Cliente
        </a>
    </div>

    <!-- Alertas flash -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Buscador -->
    <div class="card table-card mb-4">
        <div class="card-body py-2 px-3">
            <form th:action="@{/customers}" method="get" class="d-flex gap-2">
                <input type="text"
                       name="search"
                       th:value="${search}"
                       class="form-control form-control-sm"
                       placeholder="Buscar por nombre..."/>
                <button type="submit" class="btn btn-sm btn-bc px-3">
                    <i class="bi bi-search"></i>
                </button>
                <a th:if="${search}" th:href="@{/customers}"
                   class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-x"></i>
                </a>
            </form>
        </div>
    </div>

    <!-- Tabla -->
    <div class="card table-card">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(customers)}"
                 class="text-center text-muted py-5">
                <i class="bi bi-people" style="font-size:2rem;"></i>
                <p class="mt-2 mb-0">No se encontraron clientes.</p>
            </div>

            <table th:unless="${#lists.isEmpty(customers)}"
                   class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Citas</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c, stat : ${customers}">
                    <td class="text-muted small" th:text="${stat.count}"></td>
                    <td>
                        <a th:href="@{/customers/{publicId}(publicId=${c.publicId})}"
                           class="fw-semibold text-decoration-none"
                           th:text="${c.fullName}">
                        </a>
                    </td>
                    <td th:text="${c.phone}"></td>
                    <td class="text-muted small" th:text="${c.email}"></td>
                    <td>
                            <span class="badge rounded-pill"
                                  style="background:#EDE9FE;color:#8B5CF6;"
                                  th:text="${c.appointmentCount} + ' citas'">
                            </span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/customers/{publicId}/edit(publicId=${c.publicId})}"
                           class="btn btn-sm btn-outline-secondary me-1"
                           title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <button type="button"
                                class="btn btn-sm btn-outline-danger"
                                title="Eliminar"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#deleteModal'"
                                th:data-id="${c.publicId}"
                                th:data-name="${c.fullName}"
                                onclick="confirmDelete(this)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal confirmación eliminar -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h6 class="modal-title fw-bold">¿Eliminar cliente?</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-1">
                    <p class="text-muted small mb-0">
                        Se eliminará a <strong id="deleteCustomerName"></strong>
                        y todas sus citas asociadas. Esta acción no se puede deshacer.
                    </p>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                            data-bs-dismiss="modal">Cancelar</button>
                    <form id="deleteForm" method="post">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function confirmDelete(btn) {
            const id   = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            document.getElementById('deleteCustomerName').textContent = name;
            document.getElementById('deleteForm').action = '/customers/' + id + '/delete';
        }
    </script>

</section>
</body>
</html>
