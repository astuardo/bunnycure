<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Cita – BunnyCure</title></head>
<body>
<section th:fragment="content">

    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/appointments}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h4 class="fw-bold mb-0"
                th:text="${isNew} ? 'Nueva Cita' : 'Editar Cita'"></h4>
            <p class="text-muted small mb-0"
               th:text="${isNew} ? 'Completa los datos de la cita' : 'Modifica los datos de la cita'"></p>
        </div>
    </div>

    <!-- Alerta con datos parseados de WhatsApp -->
    <div th:if="${waName != null || waPhone != null}" class="alert alert-info mb-3" role="alert">
        <i class="bi bi-info-circle me-2"></i>
        <strong>Datos extraídos de WhatsApp:</strong>
        <ul class="small mb-0 mt-2">
            <li th:if="${waName != null}">👤 Nombre: <strong th:text="${waName}"></strong></li>
            <li th:if="${waPhone != null}">📱 Teléfono: <strong th:text="${waPhone}"></strong></li>
            <li th:if="${waService != null}">💅 Servicio: <strong th:text="${waService}"></strong></li>
            <li th:if="${waBlock != null}">⏰ Bloque: <strong th:text="${waBlock}"></strong></li>
        </ul>
        <p class="small text-muted mt-2 mb-0">Completa y ajusta los datos según sea necesario.</p>
    </div>

    <div class="card table-card">
        <div class="card-body p-4">
            <form th:action="${isNew} ? @{/appointments} : @{/appointments/{id}/edit(id=${appointment.id})}"
                  th:object="${appointment}"
                  method="post"
                  novalidate>

                <div class="row g-3">

                    <!-- Cliente -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Cliente <span class="text-danger">*</span>
                        </label>
                        <select th:field="*{customerId}"
                                th:classappend="${#fields.hasErrors('customerId')} ? 'is-invalid' : ''"
                                class="form-select">
                            <option value="">Selecciona un cliente...</option>
                            <option th:each="c : ${customers}"
                                    th:value="${c.id}"
                                    th:text="${c.fullName}">
                            </option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{customerId}"></div>
                    </div>

                    <!-- Tipo de servicio -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Servicio <span class="text-danger">*</span>
                        </label>
                        <select name="serviceId" class="form-select"
                                th:classappend="${#fields.hasErrors('serviceId')} ? 'is-invalid' : ''">
                            <option value="">Selecciona un servicio...</option>
                            <option th:each="s : ${serviceTypes}"
                                    th:value="${s.id}"
                                    th:selected="${appointment.serviceId != null && appointment.serviceId == s.id}"
                                    th:text="${s.name} + ' — ' + ${s.durationFormatted} + ' · $' +
                      ${#numbers.formatInteger(s.price, 0, 'POINT')}">
                            </option>
                        </select>
                    </div>

                    <!-- Fecha — usa value directo en lugar de th:field -->
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">
                            Fecha <span class="text-danger">*</span>
                        </label>
                        <input type="date"
                               id="appointmentDate"
                               name="appointmentDate"
                               th:classappend="${#fields.hasErrors('appointmentDate')} ? 'is-invalid' : ''"
                               class="form-control"
                               th:value="${isNew} ? ${appointment.appointmentDate} : ${dateValue}"/>
                        <div class="invalid-feedback" th:errors="*{appointmentDate}"></div>
                    </div>

                    <!-- Hora -->
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">
                            Hora <span class="text-danger">*</span>
                        </label>
                        <input type="time"
                               id="appointmentTime"
                               name="appointmentTime"
                               th:classappend="${#fields.hasErrors('appointmentTime')} ? 'is-invalid' : ''"
                               class="form-control"
                               th:value="${isNew} ? ${appointment.appointmentTime} : ${timeValue}"/>
                        <div class="invalid-feedback" th:errors="*{appointmentTime}"></div>
                    </div>

                    <!-- Estado (solo en edición) -->
                    <div class="col-md-4" th:unless="${isNew}">
                        <label class="form-label fw-semibold">Estado</label>
                        <select th:field="*{status}" class="form-select">
                            <option th:each="s : ${statusValues}"
                                    th:value="${s.name()}"
                                    th:text="${s.displayName}">
                            </option>
                        </select>
                    </div>

                    <!-- Observaciones -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">Observaciones</label>
                        <textarea th:field="*{observations}"
                                  class="form-control"
                                  rows="3"
                                  placeholder="Notas adicionales sobre la cita..."></textarea>
                    </div>

                </div>

                <!-- Info del cliente al editar -->
                <div th:unless="${isNew}" th:if="${aptEntity != null}"
                     class="mt-3 p-3 rounded"
                     style="background:#F9FAFB;border-left:3px solid #8B5CF6;">
                    <small class="text-muted d-block mb-1">📋 Información de la cita</small>
                    <span class="small">
                        Creada el
                        <strong th:text="${#temporals.format(aptEntity.createdAt, 'dd/MM/yyyy HH:mm')}"></strong>
                        · Notificación enviada:
                        <strong th:text="${aptEntity.notificationSent} ? 'Sí' : 'No'"></strong>
                    </span>
                </div>

                <!-- Botones -->
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-bc px-4">
                        <i class="bi bi-check-lg me-1"></i>
                        <span th:text="${isNew} ? 'Agendar Cita' : 'Guardar Cambios'"></span>
                    </button>
                    <a th:href="@{/appointments}" class="btn btn-outline-secondary px-4">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>

</section>
</body>
</html>
